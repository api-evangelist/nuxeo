aid: nuxeo
name: Nuxeo
description: >
  Nuxeo is an open-source, cloud-native enterprise content management platform
  owned by Hyland Software. It provides a comprehensive REST API for managing
  documents, digital assets, workflows, metadata, search, batch uploads, and
  cloud file storage in large-scale enterprise environments. The API supports
  OAuth2, token-based, and basic authentication, and exposes automation
  chains, content enrichers, and web adapters for flexible integration.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/nuxeo/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
