  - Enterprise
  - Documents
  - Workflows
  - Search
  - Open Source

apis:
  - aid: nuxeo:nuxeo-rest-api
    name: Nuxeo REST API
    description: >
      The Nuxeo REST API provides HTTP/HTTPS access to the full Nuxeo Platform,
      enabling CRUD operations on documents, assets, users, groups, directories,
      workflows, tasks, and configurations. It exposes an automation command
      endpoint with over 100 server-side operations, batch upload support, search
      via NXQL and page providers, OAuth2 resource management, and user preferences.
      All endpoints follow the base path /nuxeo/api/v1/.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://doc.nuxeo.com/nxdoc/rest-api/
    baseURL: https://{nuxeo-server}/nuxeo/api/v1
    tags:
      - Documents
      - Assets
      - Workflows
      - Search
      - Automation
      - Batch Upload
      - OAuth2
